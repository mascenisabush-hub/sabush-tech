<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Sabush Tech LDA</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FFFFFF; --bg-soft: #F8FAFC;
    --text: #0F172A; --muted: #475569;
    --blue: #2563EB; --blue-soft: rgba(37,99,235,0.12);
    --orange: #F97316; --orange-dark: #EA580C;
    --border: #E2E8F0;
  }
  body {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    overflow: hidden;
  }
  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(37,99,235,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .grid {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .content { position: relative; z-index: 2; max-width: 520px; }
  .code {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    color: var(--blue);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .big-num {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(7rem, 20vw, 11rem);
    font-weight: 700;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px rgba(15,23,42,0.15);
    margin-bottom: 24px;
    position: relative;
  }
  .big-num::after {
    content: '404';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: inherit;
    color: var(--bg-soft);
    -webkit-text-stroke: 0;
    filter: blur(24px);
    opacity: 0.6;
  }
  h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    margin-bottom: 14px;
  }
  p {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.75;
    margin-bottom: 36px;
  }
  .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--orange); color: #FFFFFF;
    padding: 12px 26px; border-radius: 10px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.9rem;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 4px 20px rgba(249,115,22,0.25);
  }
  .btn-primary:hover { background: var(--orange-dark); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(249,115,22,0.32); }
  .btn-ghost {
    border: 1.5px solid var(--border); color: var(--blue);
    padding: 12px 26px; border-radius: 10px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.9rem;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-ghost:hover { background: var(--blue-soft); border-color: var(--blue); }
  .logo {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Poppins', sans-serif;
    font-weight: 700; font-size: 1.1rem;
    color: var(--text); text-decoration: none;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>
<a href="index.html" class="logo"><span class="logo-dot"></span> Sabush Tech</a>
<div class="content">
  <div class="code">// error · 404</div>
  <div class="big-num">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back to where you need to be.</p>
  <div class="btns">
    <a href="index.html" class="btn-primary">Back to Home</a>
    <a href="index.html#contact" class="btn-ghost">Contact Us</a>
  </div>
</div>
</body>
</html>
